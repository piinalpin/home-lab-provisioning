name: provisioning
services:
  postgres:
    build:
      context: database/postgres
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: SevenEightTwo782
    command:
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default.net

  mailpit:
    container_name: mailpit
    image: axllent/mailpit
    mem_limit: 64m
    environment:
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    ports:
      - "8025:8025"
      - "1025:1025"

networks:
  default.net:
    external: true

volumes:
  postgres-data: